<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Casino</title>

    <!-- стиль -->
    <link rel="stylesheet" href="style.css">

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h1>🎰 CASINO</h1>

<div class="card">

    <p>💰 Баланс: <span id="balance">100</span></p>

    <input id="bet" type="number" value="10">

    <div class="buttons">
        <button onclick="playPlinko()">🎰 Plinko</button>
        <button onclick="startBlackjack()">🃏 Blackjack</button>
    </div>

</div>

<div class="card">
    <h2>🎮 Гра</h2>

    <div id="game"></div>

    <div id="cards"></div>

    <div id="bjControls" style="display:none;">
        <button onclick="hit()">Hit</button>
        <button onclick="stand()">Stand</button>
    </div>
</div>

<div class="card">
    <h2>⚙️ ADMIN</h2>

    <input id="edge" type="number" value="0.5" step="0.1">
    <button onclick="setEdge()">Змінити шанс</button>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
